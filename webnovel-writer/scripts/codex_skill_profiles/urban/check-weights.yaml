profile: urban
version: "1.0"
description: "都市异能题材写作辅助"
rules_file: rules.md

# 基于 genre-profiles.md §2.6 urban-power 配置
checkers:
  pacing:
    weight: 1.0
    thresholds:
      stagnation: 3
      strand_quest_max: 5
      strand_fire_gap_max: 8
      transition_max_consecutive: 2
  coolpoint:
    weight: 1.0
    thresholds:
      combo_interval: 3
      milestone_interval: 10
      density_per_chapter: high
  consistency:
    weight: 1.0
  hook:
    weight: 1.0

# genre-profiles 联动参数
genre_ref:
  id: urban-power
  name: "都市异能"
  debt_multiplier: 1.0
  payback_window_default: 3
  allowed_override_rationales:
    - TRANSITIONAL_SETUP
    - ARC_TIMING
